    <title>Document</title>

  <body>
    <script>
      /*
      进程(Process)和线程(Thread)都是操作系统的概念
      
      进程：程序的一次执行，占用一片独立的内存空间，可以理解为，打开一个浏览器就是开启一个进程，是一个应用或者容器

      线程：
      - 是线程的一个独立执行单元
      - 是程序执行的一个完整流程
      - 是cpu的最小调度单元
      - 比如在浏览器内打开一个tab标签页，就是开启一个线程

      单线程和多线程的概念：
      一个进程内只有一个线程，就叫单线程；
      一个进程有多个线程，叫多线程。
      比如一个班级是一个进程，班级里面的学生都在各自独立的学习，每个学生就是每个独立的线程，班集体这种形式就是多线程；
      如果是一对一辅导班的形式，一个班级，辅导一个学生学习，这种就是单线程，一个辅导班内只有一个学生进程在学习。


      */
    </script>
  </body>
</html>
