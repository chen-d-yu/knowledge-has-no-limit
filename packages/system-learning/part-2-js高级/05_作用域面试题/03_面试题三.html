<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Document</title>
</head>
<body>
<script>
    var n = 100;

    function foo1() {
        console.log(n); // 100
    }

    function foo2() {
        var n = 200;
        console.log(n); // 200
        foo1();
    }

    foo2();

    /*
    这题的考核点在
      作用域是在函数创建时确定的，跟在哪里执行是无关的
    */
</script>
</body>
</html>
