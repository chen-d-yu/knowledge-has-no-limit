<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button>点击</button>
    <script>
      // 像是js内置的函数this绑定，只能根据经验去判断判断的对象
      // 1.setTimeout绑定this是Window
      setTimeout(function () {
        console.log("定时器", this);
      }, 0);

      // 2.dom元素，绑定的是当前事件的dom元素
      var btn = document.querySelector("button");
      btn.onclick = function () {
        console.log("dom元素事件", this);
      };

      btn.addEventListener("click", function () {
        console.log("dom元素事件", this);
      });

      // 3.forEach、map、some、every、filter、find、findIndex等 js api 不传递 thisArg 参数，那么this就是window
      var arr = [1, 2, 3];
      arr.arr.forEach(function () {
        console.log(this);
      });
      arr.map(function () {
        console.log(this);
      });
      arr.some(function () {
        console.log(this);
      });
      arr.every(function () {
        console.log(this);
      });
      arr.filter(function () {
        console.log(this);
      });
      arr.find(function () {
        console.log(this);
      });
      arr.findIndex(function () {
        console.log(this);
      });
    </script>
  </body>
</html>
