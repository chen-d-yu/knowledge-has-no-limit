<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var obj = {
        name: "张三",
        _time: undefined,
        _name: undefined,
      };

      // get：访问对象属性时调取的方法
      // 通常_开头的属性，表示该属性是私有变量，只能被对象方法get所修改
      Object.defineProperty(obj, "time", {
        configurable: true,
        enumerable: false,
        get: function () {
          return this._time;
        },
      });

      // set：设置对象属性时调用的方法
      Object.defineProperty(obj, "name", {
        configurable: true,
        enumerable: false,
        set: function (value) {
          this._name = value;
        },
        get: function () {
          return this._name;
        },
      });

      obj.name = "李四";
      console.log(obj.name);
    </script>
  </body>
</html>
