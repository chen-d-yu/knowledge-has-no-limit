<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var obj = {
        name: "张三",
        age: 18,
      };

      // 当且仅当该属性的 configurable 键值为 true 时，该属性的描述符才能够被改变，同时该属性也能从对应的对象上被删除。 默认为 false。
      // 通过Object.defineProperty新增的属性，他的configurable默认值为false
      // 如果为false，后续【下次调用Object.defineProperty】不能对该属性就行属性描述的所有操作，修改configurable也不行
      Object.defineProperty(obj, "name", {
        configurable: false,
      });
      delete obj.name;
      console.log(obj); // 删除无效  {name: '张三', age: 18}

      // 当且仅当该属性的 enumerable 键值为 true 时，该属性才会出现在对象的枚举属性中。
      // 也就说，只有这个属性为true，才能进行遍历
      Object.defineProperty(obj, "addr", {
        enumerable: false,
      });
      console.log(Object.keys(obj)); // addr key值无法被遍历 ['name', 'age']

      // writable为true时，属性可读可写，为false时，只为可读不可写，就算写入也会不成功
      Object.defineProperty(obj, "addr", {
        writable: false,
      });
      obj.addr = "广州市";
      console.log(obj); // {name: '张三', age: 18, addr: undefined} 可见并没有写入成功

      // 该属性对应的值。可以是任何有效的 JavaScript 值（数值，对象，函数等）。默认值是undefined
      Object.defineProperty(obj, "phone", {
        value: "110",
      });
      console.log(obj); // {name: '张三', age: 18, addr: undefined, phone: '110'}
    </script>
  </body>
</html>
