<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 1.单个属性描述 defineProperty
      Object.defineProperty(obj, "name", {
        configurable: true,
        enumerable: false,
        // ...prop
      });

      // 2.多个属性描述符 defineProperties
      Object.defineProperties(obj, {
        name: {
          configurable: true,
          enumerable: false,
          // ...prop
        },
        age: {
          // ...prop
        },
      });
    </script>
  </body>
</html>
