<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <script>
      //  1.如果只有一个参数，小括号可省略
      var fn = (a) => {};

      // 2.如果语法体只有一条语句，大括号可省略
      var fn2 = (a) => console.log(a);

      // 3.return 且 只有一条语句,return和大括号可省略
      var fn2 = (a) => a * a;
    </script>
  </body>
</html>
