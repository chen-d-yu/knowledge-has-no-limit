<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /*
      浏览器主进程：界面显示、用户交互、子进程管理
      渲染进程：V8引擎，将html、css、js渲染为页面
      GPU进程：绘制页面
      网络进程：负责网络资源的加载
      插件进程：


      1.线程与进程
      2.浏览器进程
      3.输入url->渲染：主进程、网络进程、渲染进程
        1、在地址栏输入内容，这个阶段会发生判断输入的内容是关键字还是url，
        - 关键字，调用浏览器的默认搜索引擎
        - url，将操作移交给网络进程负责
        2.在敲下回车时。进入导航阶段，使用ipc与网络进程通信：
          - 准备发起url请求
          - 判断是否有缓存资源，有返回资源，没有就发起url请求，进入网络请求流程
            - DNS解析，获取url对应的网络服务器ip地址
            - https协议建立TLS
            - 建立TCP链接
            - 构建请求头、请求行、cookies
            - 读取响应头信息：如果有重定向，根虎新地址，重新走一遍网络请求阶段。根据content-type决定如何响应显示内容，比如html/text类型，会直接渲染，其他的application/**资源，会交给下一步处理
          - 与渲染进程通信，准备开始渲染
          - 通知渲染进程，并提交文档过去
          - 渲染进程与网络进程建立管道通信，读取响应体资源
          - 传输完成后，会确认提交，主进程收到确认信息，会与网络进程断开联系
          - 渲染进程接着开始解析和资源加载-> 页面加载完成



    

          总结：
          分为几个阶段：导航阶段，获取数据阶段、HTML、CSS、JavaScript资源加载、解析阶段、组合渲染树绘制阶段


      
 
      
      
      ----------------------------------------------------------------------------------------------------
      1.域名解析：导航
        1.1.浏览器判断输入的是关键字还是url
            - 关键字，调用浏览器默认搜索引擎
            - url，准备发起请求
        1.2.判断该网址是否有缓存
            - 有，返回缓存资源
            - 无，进行DNS解析
        1.3.DNS解析，获取url对应的网络服务器的ip地址
        
      2.发起请求：请求阶段
        2.1.建立链接：http，建立TCP链接
        2.2.构建请求头、请求行、cookies
        2.3.发送url请求

      3.响应资源：响应阶段
        3.1.获取响应体
        3.2.检查是否存在缓存
            - 是，直接使用缓存，进入渲染阶段
            - 否，下载资源
        3.3.断开链接，避免两端的资源占用与损耗，当双方没有发生请求或响应时，任意一方都可以关闭请求链接

      4.解析：解析阶段
        4.1.浏览器边下载、边解析、边渲染
        4.2.head的mate、link，head标签加载完会进行第一次渲染，在head标签中放JS脚本，渲染会先暂停转而去执行解析JS脚本代码，因为JS脚本可能会修改DOM，所以JS代码会阻塞DOM解析，CSS资源下载是发生在独立线程中，所以CSS资源下载不会阻塞DOM树加载，但是它会阻塞Render tree的合成
        4.3.浏览器自上而下解析HTML，在这个阶段构建DOM树，构建的过程中，也会去请求CSS资源、JS脚本资源，但是其中两个的区别就是CSS资源不会阻塞渲染，而JS脚本会阻塞渲染(因为可能会通过JS去改变DOM)
        4.4.在拿到CSS资源后，进行CSS解析处理，生成CSSOM树
        4.5.在拿到JS资源时，会将JS代码解析构建成为AST抽象语法树，构建完后会被翻译成机械码并立即执行
        4.6.浏览器会将CSSOM树和DOM树进行合成Render树
      
      5.根据Render tree渲染：渲染阶段
        5.1.在拿到渲染树，会根据渲染树的信息，计算元素在设备视口内的位置和大小，这个阶段叫回流
        5.2.将计算好的信息节点，通过IPC与GPU进程通信
        5.3.GPU绘制并展示在页面上
      
      性能优化：
      根据每个阶段有优化的手段

      
      */
    </script>
  </body>
</html>
