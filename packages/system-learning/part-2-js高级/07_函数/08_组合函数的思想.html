<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 低情商写法
      var str = "function program";

      // 一行代码搞定
      function oneLine(str) {
        var res = str.toUpperCase().split("").reverse().join("");
        return res;
      }

      // 或者 按要求一步一步来，先转成大写，然后逆序
      function multiLine(str) {
        var upperStr = str.toUpperCase();
        var res = upperStr.split("").reverse().join("");
        return res;
      }

      console.log(oneLine(str)); // MARGORP NOITCNUF
      console.log(multiLine(str)); // MARGORP NOITCNUF

      // 高情商写法
      function compose(...fns) {
        debugger;
        if (fns.length <= 0) {
          return;
        }

        return function (...args) {
          // 执行第一个函数，得到结果，返回给下一个使用
          var result = fns[0].apply(this, args);
          for (var i = 0; i < fns.length; i++) {
            var fn = fns[i];
            result = fn.apply(this, args);
          }
          return result;
        };
      }

      let add = (x) => x + 10;
      let multiply = (y) => y * 10;

      const result = compose(add, multiply);
      result(10);
    </script>
  </body>
</html>
