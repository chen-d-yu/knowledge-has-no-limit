  <body>
    <script>
      var person = {
        eat: function () {
          console.log("eat shit");
        },
      };
      person.__proto__.eat = function () {
        console.log("None of your business");
      };

      person.eat(); // eat shit => 输出自身的eat方法
    </script>
  </body>
