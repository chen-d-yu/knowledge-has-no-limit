<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /*
      函数参数补充：
        一.函数默认参数
          在函数调用时，不传递参数的情况下，给形参赋上默认值
          ES6之前是在函数内部判断形参是否有值，没有的话重新赋值，但是这种写法是繁琐的
          eg:
            function foo(arg1) {
              arg1 = arg1 === undefined || arg1 === null ? "默认值" : arg1;
              console.log(arg1);
            }
           
          ES11新增的语法 ?? 能解决这一问题
          eg:
            function foo(arg1) {
              arg1 = arg1 ?? "默认值";
              console.log(arg1);
            }
          
          但是另外一种方法更加适合，就是在参数处直接赋默认值，减少了对参数的边界处理步骤(不会对为null的值进行处理)
            - 不会对为null的值进行处理
            - 会对函数的length提前中断返回，在碰见第一个默认值的参数会直接返回前面参数的个数，后面的所有的参数不会计算在length之内
            - 默认参数放置在剩余参数之前，其他参数之后 function foo(age, name = "默认参数", ...args){}
          eg:
            function foo(arg1 = "默认值") {
              console.log(arg1);
            }

        二.默认参数解构
          当函数的参数是一个对象时，给函数对象赋默认值，并解构的语法
          eg:
            function foo({ name = "张三" } = {}) {
              console.log(name);
            }

        三.箭头函数

          3.1.原型
          箭头函数是没有显式原型的，只有隐式原型，所以箭头函数无法充当构造函数，无法被 new 所实例化
      */
      // 一.函数参数默认值补充
      // 1.1.ES6之前繁琐的写法
      function foo(arg1) {
        arg1 = arg1 === undefined || arg1 === null ? "默认值" : arg1;
        console.log(arg1);
      }

      // 1.2.ES11的写法
      function foo1(arg1) {
        arg1 = arg1 ?? "默认值";
        console.log(arg1);
      }

      // 1.3.最为合适的写法，在函数内部不需要进行参数的边界处理
      function foo2(arg1 = "默认值") {
        console.log(arg1);
      }

      // 二.函数对象参数解构默认值补充
      // 2.1.给函数对象赋默认值，缺陷是右边有了，左边还要再写一遍
      function foo3({ name } = { name: "张三" }) {}

      // 2.2.改进写法
      function foo4({ name = "张三" } = {}) {
        console.log(name);
      }
    </script>
  </body>
</html>
