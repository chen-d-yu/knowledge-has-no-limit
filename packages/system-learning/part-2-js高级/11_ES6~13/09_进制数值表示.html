  <body>
    <script>
      /*
    一.进制的表示

    1.十进制
      不以下面任何开头的，表示为十进制，也是数值默认使用的进制

    2.二进制 binary
      0b开头的数字组合表示二进制：0b10100 => 20

    3.八进制 octonary
      0o开头的数字组合表示八进制：0o24 => 20

    4.十六进制 hexadecimal
      0x开头的16进制数字组合：0x14 => 20 
    
    5.关于进制之间的互相转换，会另外开一章节

    二.长数字表示，ES12新增规范，在表示大数字时，可以在数字中加下划线表示分割
      比如 1000000000，用这种方式也能表示 1_000_000_000
    */
    </script>
  </body>
</html>
