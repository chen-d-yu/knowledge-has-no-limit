<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /*
        Set是ES6新增的数据结构，是一种集合数据结构或者称之为队列，允许存储任何不重复类型的唯一值

        一.特点
          1.1.元素必须是唯一的，不能重复
          1.2.可以存放任何类型的数据
          1.3.队列中的元素是无序的，所以没有索引值
          1.4.队列的元素是可迭代的，也就是说可以for...of遍历，也能使用forEach，但是其他的方式map,reduce,some...是没有的
          1.5.队列的元素是可以添加、删除、更改
          1.6.长度不再是通过length获取，而是用 队列.size 获取

        二.方法

          2.1.add(value)：向Set对象中添加一个新元素，并返回Set对象本身
          2.2.clear()：清空Set对象中的所有元素
          2.3.delete(value)：从Set对象中删除一个元素并返回一个布尔值，表示删除是否成功
          2.4.entries()
          2.5.has(value)：判断Set对象中是否包含某个元素，如果存在则返回true，否则返回false
          2.6.keys()：返回一个新的迭代器对象，该对象包含Set对象中每个元素的值
          2.7.values()：返回一个新的迭代器对象，该对象包含Set对象中每个元素的值
          2.8.size：获取Set对象中元素的个数

        三.应用场景

          3.1.去重
        */

      // 一.基础使用

      // 1.创建Set对象
      const set = new Set();

      // 2.添加元素，任何类型且不重复的值，如果重复添加，则该次添加无效
      const fn = function () {
        console.log(123);
      };
      set.add("abc");
      set.add(fn);

      set.add("abc"); // 相同元素在Set里面只能存在一份，对值类型对比的是值，引用类型对比的是引用地址

      // 3.清空Set对象
      const mySet = new Set();
      mySet.add("apple");

      mySet.clear();
      console.log(mySet); // Set {}

      // 4.删除元素
      set.delete("abc");

      // 5.判断是否存在某个元素
      console.log(set.has(fn)); // true

      // 6.values()返回新的迭代器对象，该对象包含Set对象中每个元素的值
      console.log(set.values()); // 迭代器对象

      // 7.keys()返回新的迭代器对象，该对象包含Set对象中每个元素的值，可能是因为和Map公用了这个方法，Set没有键名，所以返回了键值
      console.log(set.keys()); // 迭代器对象

      // 8.size 返回Set对象元素的个数
      console.log(set.size); // 1
    </script>
  </body>
</html>
