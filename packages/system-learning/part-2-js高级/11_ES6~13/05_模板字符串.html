<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /*
      模板字符串：
        由一对反引号 `` 括起来的字符串组成，在字符串中可以用 ${} 嵌入变量、表达式、运行函数的值
        被括起来的字符串，可以当做普通的字符串使用，也可以用来定义多行字符串(在 `` 范围内换行不影响结果)
        还可以当做一个函数参数传递执行

        一.基础使用

          1.1.字符串拼接
          1.2.换行字符串
          1.3.嵌入变量、表达式、运行函数的值

        二.标签模板字符串：作为参数传递并调用函数
          如果使用了标签模板字符串调用函数，整个模板字符串会被拆分，并在在调用时候嵌入了变量内容时，
            - 第一个元素是数组，是被嵌入的内容拆分后的字符串
            - 剩下的元素是模板字符串嵌入的内容依次排列
          在 react 的 css-in-js 的使用 styled-components 库会用到
          css-in-js 的最大好处，就是能动态插入变量，而且可以使用中横杠的css命名方式
          
          eg:
            const name = '张三'
            const age = 18
            function foo(...args){
              console.log(args)
            }

            foo`my name is ${name}, i'm ${age} old` // args -> [["my name is", "i'm", "old"], name, age]

          2.1.调用函数
      */
      const name = "张三";
      const age = 18;

      function sum(x, y) {
        return x + y;
      }

      function foo(...args) {
        console.log(args);
      }

      // 1.1.字符串拼接
      const intro = `my name is ${name}, i'm ${age} old`;
      console.log(intro);

      // 1.2.换行字符串
      const newlineStr = `
              my name is ${name}, 
              i'm ${age} old`;
      console.log(newlineStr);

      // 1.3.嵌入变量、表达式、运行函数的值
      const sumVal = `The value of 10 + 5 is ${sum(10, 5)}`;
      console.log(sumVal);

      // 2.1.调用函数
      foo`my name is ${name}, i'm ${age} old`; // [["my name is", "i'm", "old"], "张三", 18]
    </script>
  </body>
</html>
