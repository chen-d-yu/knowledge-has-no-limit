<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /*
      同步和异步：

      JavaScript是一门单线程语言，意味着在一个时间段内只能处理一件事，也就是说 js 引擎一次只能在一个线程里处理语句
      这种方式优化了编程代码，不必担心线程并发引起的问题，但是这也意味着，一些操作会阻塞主线程，如果时间长了，网页会一直等待处于无响应的状态，比如 ajax 网络请求
      而异步编程(Promise、回调函数、async/await)可以不用阻塞主线程的情况下执行长时间的操作

      在了解异步编程工作流程之前，我们先看一下同步是如何工作的

      1.同步js
      JavaScript的调用栈只有一个，当前的 函数/语句 如果未执行完成，就会一直占用着调用栈，直到它执行成功后弹栈
      一个接一个的函数/代码不停的入栈出栈，完成了 js 主线程的工作

      2.异步js
      当我们用同步的方式去编写异步代码时，异步代码需要长时间的等待，一直未完成就一直不弹栈，这就造成了调用栈的阻塞，也就是主线程的阻塞

      可以看到案例一 函数blockMainThread 由于一个大循环，占用主线程很长的时间，阻塞后续的代码，这种异步代码阻塞主线程是很不理想的
      解决办法就是上面所说到的需要异步编程
      异步编程类似于系统中断，它允许程序在执行某些操作时不必等待该操作完成，而是可以继续执行其他操作。

      简而言之，同步编程就是从上往下执行代码，当前的操作如果未完成，会一直阻塞主线程执行后续的代码
      异步编程是可以执行一些操作不比等待该操作完成，转而执行其他操作
      */
      // 案例一
      function blockMainThread() {
        // 执行一个耗时的循环
        for (let i = 0; i < 10000000000; i++) {}

        console.log("循环结束");
      }

      blockMainThread();

      console.log("这一行代码将在循环结束后才会被执行");
    </script>
  </body>
</html>
