<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../lib/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <h2 v-pre>初始值：{{n}}</h2>
      <h2 v-pre>当前值：{{n}}</h2>
    </div>
    <script>
      /*
      v-pre：Vue 会跳过 v-pre 所在的节点的编译过程，会将标签内容，原原本本渲染在页面上

      利用它跳过普通元素，加快 Vue 解析元素渲染速度。
      */
      const vm = new Vue({
        data() {
          return {
            n: 1,
          };
        },
      });

      vm.$mount("#app");
    </script>
  </body>
</html>
