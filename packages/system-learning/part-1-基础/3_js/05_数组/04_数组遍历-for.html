<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      var arr = ["山东省", "天津", "贵州省", "吉林省", "陕西省"];

      // 1.for
      for (var i = 0; i < arr.length; i++) {
        console.log(i);
        console.log(arr[i]);
      }

      // 2.for in
      for (const i in arr) {
        console.log(i); // i为数组元素索引
        console.log(arr[i]);
      }

      // 3.for of 拿不到索引
      for (const item of arr) {
        console.log(item); // item为数组每一个元素
      }
    </script>
  </body>
</html>
