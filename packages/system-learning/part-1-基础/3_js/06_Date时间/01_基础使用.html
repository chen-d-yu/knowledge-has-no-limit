<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 1.不传参数直接实例化，返回当前时间
      var date = new Date();
      console.log(date); // Wed Feb 15 2023 16:01:59 GMT+0800 (中国标准时间)

      // 2.传入format时间字符串，返回指定参数时间，如果缺少时间，会默认返回00:00:00
      var date2 = new Date("2022-08-09");
      console.log(date2); // Tue Aug 09 2022 08:00:00 GMT+0800 (中国标准时间)

      // 3.传入年,月,日,时,分,秒,毫秒，参数之间逗号分割，返回指定参数时间
      var date3 = new Date(2023, 02, 15, 16, 02, 29); // Wed Mar 15 2023 16:02:29 GMT+0800 (中国标准时间)
      console.log(date3);

      // 4.传入时间戳，返回时间戳指定时间
      var date4 = new Date(1676448333176); // 1676448333176 => 2023-02-15 16:05:33
      console.log(date4); // Wed Feb 15 2023 16:05:33 GMT+0800 (中国标准时间)
    </script>
  </body>
</html>
