<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../lib/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <span v-text="addr"></span>
    </div>
    <script>
      /*
      v-text：默认是将元素中的内容用 el.textContent 整个替换掉，只会将所有的内容当做字符串解析，它不支持结构的解析，比如 "<div>广州</div>" ，会原封不动直接输出到页面上
      
      与差值语法的区别就是 v-text 会替换内容
      */
      const vm = new Vue({
        data() {
          return {
            addr: "广州",
          };
        },
      });

      vm.$mount("#app");
    </script>
  </body>
</html>
