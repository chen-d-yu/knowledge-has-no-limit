<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../lib/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <div v-html="str"></div>
    </div>
    <script>
      /*
      v-html：与 v-text 的作用类似，绑定在标签上，解析数据，与它的最大不同就是，该指令会解析模板字符串，也就是 "<div>广州</div>" 这种内容

      这个标签建议少用，因为会引起 xss注入攻击 ，在网络上动态渲染标签是很危险的
      
      
      
      */
      const vm = new Vue({
        data() {
          return {
            str: "<h2>岁月如歌古今愁</h2>",
          };
        },
      });

      vm.$mount("#app");
    </script>
  </body>
</html>
