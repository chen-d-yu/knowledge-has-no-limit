<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../lib/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>{{msg}}</h1>
    </div>
    <script>
      // 1.创建vue实例，并传递 options api
      const app = new Vue({
        // 2.el：表示选择挂载到哪个元素下
        el: "#app",
        // 3.data：定义数据并交给Vue托管
        data() {
          return {
            msg: "hello Vue",
          };
        },
      });
    </script>
  </body>
</html>
