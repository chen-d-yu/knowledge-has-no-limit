<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../lib/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- 1.v-if -->

      <!-- 1.1.基础使用 -->
      <h2 v-if="age >= 60">老人if</h2>

      <!-- 1.2.if-else -->
      <h2 v-if="age >= 60">老人</h2>
      <h2 v-else>幼儿</h2>

      <!-- 1.3.if-else if-else -->
      <h2 v-if="age >= 60">老人</h2>
      <h2 v-else-if="age >= 18">年轻人</h2>
      <h2 v-else>幼儿</h2>

      <!-- 2.v-show -->
      <h2 v-show="age >= 60">老人show</h2>

      <!-- 3.v-if搭配template -->
      <template v-if="n === 1">
        <h2>1</h2>
        <h2>2</h2>
        <h2>3</h2>
      </template>

      <button @click="changeShow" type="button">改变年龄</button>
      <button @click="n+=1" type="button">n+1</button>
    </div>
    <script>
      /*
      v-if & v-show：只有当满足条件时，才会渲染标签内容及其子内容

      v-if和v-show的区别：
        v-if不满足条件时，对应的元素会完全从dom树中移除，相关的事件和组件也会被销毁，也就是说，条件不满足时，该元素及其子组件不存在于页面上
        v-show不满足条件时，对应元素仍存在于dom中，只是通过 display: none 来隐藏它

      如果需要频繁操作一个元素的显隐状态，建议使用 v-show，性能开销会小点
      如果一个元素很少改变状态或者初始化的开销比较大，建议使用 v-if

      v-if 可以和 templage搭配使用，v-show 则不可以，因为 template 不是一个规范的 H5 元素标签，如果搭配了 v-show，在html中会忽略解析
      
      */
      const app = new Vue({
        el: "#app",
        data() {
          return {
            age: 18,
            n: 0,
          };
        },
        methods: {
          changeShow() {
            this.age = Math.ceil(Math.random() * 100);
            console.log(this.age);
          },
        },
      });
    </script>
  </body>
</html>
