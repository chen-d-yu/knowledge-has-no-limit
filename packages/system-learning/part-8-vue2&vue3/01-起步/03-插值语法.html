<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../lib/vue.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>插值语法</h1>
      <!-- 1.基本使用 -->
      <div>{{name}}</div>

      <!-- 2.表达式 -->
      <div>{{ 1+1 }}</div>
      <div>{{ name.split("").join("-") }}</div>
      <div>{{ name.length > 0 ? '有名有姓' : '无名之辈' }}</div>

      <!-- 3.函数返回值 -->
      <div>{{ sum(1,2) }}</div>
    </div>
    <script>
      const app = new Vue({
        el: "#app",
        data() {
          return {
            name: "赵紫龙",
          };
        },
        methods: {
          sum(x, y) {
            return x + y;
          },
        },
      });
    </script>
  </body>
</html>
