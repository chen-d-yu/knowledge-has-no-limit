<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.js"></script> -->
    <script src="./lib/jquery.js"></script>
  </head>
  <body>
    <div class="box"></div>
    <script>
      /*

      JQ是个JS库，方便操作dom、遍历、事件处理、动画、Ajax等api
      
      1.库和框架的概念：
      库：
        库是一组可重用的代码集合，通过将其导入到应用程序中可以实现特定的功能。对于库来说，开发者需要手动调用其中的函数或方法才能使用其提供的功能。
        库通常用于解决某个特定的问题，如处理图像、网络通信等。

      框架：
        框架是一个更加完整的解决方案，包含了一系列的库和工具，同时也定义了应用程序的结构和流程。在框架中，开发者需要遵循框架所规定的规则和约定来编写代码，从而实现应用程序的目标。
        框架则更加全面，通常适用于构建大型、复杂的应用程序，如Web应用程序、移动应用程序等。

      简单点来说，库是小而美，完成某个需求
      框架是大而全，能提供一系列的解决方案

      2.JQ的优缺点
        优点：
          - 易于学习，编码风格与JavaScript的编码风格类似
          - 少写多做
          - 对IE兼容(IE去spa)

        缺点：
          - 命令式编程，不适合组件化开发
          - 频繁操作DOM，不利于性能优化

      3.安装
        CDN、npm、下载源文件引入
        浏览器自上而下加载脚本，加载完JQ脚本，会在window添加一个工厂函数——JQuery或者$函数

      4.基本使用
        window.$ === window.jQuery // true
        const $box = $(".box");
        $box.text("hello world");

    */
    </script>
  </body>
</html>
