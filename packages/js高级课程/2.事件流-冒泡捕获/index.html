	//  委托
	const ul = document.getElementsByTagName("ul")[0]
	let count = 0

  ul.addEventListener("click",function (e){
		if (e.target.nodeName === "LI"){
			console.log("li is ->  ", e.target.innerHTML)
    }
  })

	const addLi = () => {
		console.log('addLi')
		const li = document.createElement("li")
		li.innerText = `新增的 ${count} li`
		ul.appendChild(li)
		count++
	}
