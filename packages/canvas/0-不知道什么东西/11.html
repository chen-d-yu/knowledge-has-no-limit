    <svg style="width: 200px; height: 200px" viewBox="0 0 200 200">
      <path
        fill="#26627b"
        d="M 97 0 L 97 50 A 50 50 0 0 0 50 97 L 0 97 A 100 100 0 0 1 97 0"
      ></path>

      <path
        fill="#26627b"
        d="M 103 0 L 103 50 A 50 50 0 0 1 150 97 L 200 97 A 100 100 0 0 0 103 0"
      ></path>
      <path
        fill="#26627b"
        d="M 103 200 L 103 150 A 50 50 0 0 0 150 103 L 200 103 A 100 100 0 0 1 103 200"
      ></path>
      <path
        fill="#26627b"
        d="m 0 103 L 50 103 A 50 50 0 0 0 97 150 L 97 200 A 100 100 0 0 1 0 103"
      ></path>
      <polygon points="40,40 55,40 40,55" style="fill: #fff; stroke-width: 1" />
      <polygon
        points="160,40 145,40 160,55"
        style="fill: #fff; stroke-width: 1"
      />
      <polygon
        points="160,160 160,145 145,160"
        style="fill: #fff; stroke-width: 1"
      />
      <polygon
        points="40,160 55,160 40,145"
        style="fill: #fff; stroke-width: 1"
      />
    </svg>

    <script>
      const semicircle = document.querySelectorAll(".semicircle");
      const big = document.querySelector("#big");
      console.log(big);
      for (let i = 0; i < semicircle.length; i++) {
        semicircle[i].addEventListener(
          "mousemove",
          function (e) {
            this.style.fill = "#43ba9e";
          },
          false
        );

        semicircle[i].addEventListener(
          "mouseleave",
          function (e) {
            this.style.fill = "#26627b";
          },
          false
        );
      }

      big.addEventListener(
        "mousemove",
        function (e) {
          this.style.fill = "#43ba9e";
        },
        false
      );

      big.addEventListener(
        "mouseleave",
        function (e) {
          this.style.fill = "#26627b";
        },
        false
      );
    </script>
